# quizzes/present-past-basic.toml

title   = "Present & Past - Simple / Continuous"
section = "Tenses"
kind    = "multi"
intro   = "Обери правильну форму дієслова для кожного речення."

rules = '''
<b>Simple = взагалі · Continuous = у процесі:</b>
<span class="grp" style="margin-top:10px">
  <b>1. Present Simple</b> -> факти, звички, розклади.<br>
  <span class="why">💡 Дія як <i>загальна правда</i> чи <i>регулярність</i>, а не «просто зараз». 3-тя особа однини: <b>-s/-es</b>.</span>
  <span class="v">маркери: always, usually, every day, on Mondays, never; розклади (the train leaves)</span><br>
  ✅ water <b>boils</b> · she <b>goes</b> to the gym on Mondays<br>
</span>
<span class="grp">
  <b>2. Present Continuous</b> (am/is/are + -ing) -> саме зараз / тимчасово / тенденція.<br>
  <span class="why">💡 Дія <i>у розпалі</i> навколо моменту мовлення або обмежений період. З <b>always</b> = роздратування.</span>
  <span class="v">маркери: now, at the moment, Look!, Listen!, this week, these days, currently</span><br>
  ✅ Look! it <b>is raining</b> · I <b>am staying</b> with friends this week<br>
</span>
<span class="grp">
  <b>3. Stative verbs</b> -> стан, а не дія - <b>без Continuous</b>.<br>
  <span class="why">💡 Дієслова думки/почуття/володіння описують стан, тож ідуть у Simple навіть про «зараз»: <i>I understand</i>, не «am understanding».</span>
  <span class="v">know, understand, believe, want, like, love, need, prefer, own, have(=мати), seem, cost, contain</span><br>
  ✅ I <b>understand</b> · it <b>costs</b> €200 &nbsp;·&nbsp; ❌ am understanding, is costing<br>
  <span class="note2">think/have міняють значення: <b>be thinking about</b> = обмірковувати (дія), <b>be having</b> lunch = їсти (дія).</span>
</span>
<span class="grp">
  <b>4. Past Simple <-> Past Continuous</b> -> завершена подія vs дія-в-процесі/фон.<br>
  <span class="why">💡 <b>Past Continuous</b> (was/were + -ing) ставить сцену або довгу дію; <b>Past Simple</b> - раптова коротка подія, що її перериває.</span>
  <span class="v">while + Continuous (фон) · when + Simple (раптова подія)</span><br>
  ✅ While I <b>was watching</b> TV, the phone <b>rang</b>.<br>
</span>
'''

[[question]]
id      = 1
group   = "1. Present Simple vs Present Continuous - взагалі vs саме зараз"
