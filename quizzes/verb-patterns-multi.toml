# quizzes/verb-patterns-multi.toml

title   = "Verb Patterns (multi-select)"
section = "Verb patterns"
kind    = "multi"
intro   = "Що ставити після дієслова. Познач ВСІ правильні завершення для кожного питання."

rules = '''
<b>4 якорі - що ставити після дієслова:</b>
<span class="grp" style="margin-top:10px">
  <b>1. -ing група</b> -> лише <b>-ing</b>, ніколи «to».<br>
  <span class="why">💡 Дія тут - наче річ чи процес, тож герундій («дія-як-іменник»): <i>enjoy swimming</i> ≈ «люблю саме плавання».</span>
  <span class="v">enjoy, finish, avoid, mind, deny, admit, practise, risk</span><br>
  ✅ enjoy <b>swimming</b> &nbsp;·&nbsp; ❌ enjoy to swim<br>
  <span class="note2">deny та admit, окрім -ing, беруть ще й «that…»: denied <b>that</b> he stole it.</span>
</span>
<span class="grp">
  <b>2. PIDRS</b> (propose, insist, demand, recommend, suggest) - спільне: <b>ніколи «sb to do»</b>.<br>
  <span class="why">💡 Ти не наказуєш людині напряму, а пропонуєш/вимагаєш саму дію - тому замість «sb to do» іде -ing або that-речення. А форма різна:</span>
  • suggest / recommend / propose -> <b>-ing</b> або <b>that</b>: suggest <b>going</b> / that we go<br>
  • insist -> <b>on -ing</b> / that: insist <b>on paying</b><br>
  • demand -> <b>to-inf</b> / that: demand <b>to be paid</b> <span class="note2">(виняток!)</span><br>
  ❌ suggest me to go &nbsp;·&nbsp; ❌ demand the boss to pay
</span>
<span class="grp">
  <b>3. sb + to do</b> -> об’єкт + <b>to-infinitive</b>.<br>
  <span class="why">💡 Дія спрямована на людину: ти впливаєш на когось, щоб він щось зробив, тож обов’язково об’єкт. <i>persuaded me to stay</i> = «переконали мене лишитися».</span>
  <span class="v">persuade, encourage, ask, tell, want, force, allow, remind, expect, get</span><br>
  ✅ persuaded me <b>to stay</b> &nbsp;·&nbsp; told him <b>to wait</b><br>
  <span class="note2">tell / remind / ask / expect беруть ще й «that…»: told me <b>that</b> he was late.</span>
</span>
<span class="grp">
  <b>4. make / let / have / hear / see / watch</b> -> <b>гола форма</b> (без «to»).<br>
  <span class="why">💡 Примус (make / let / have) і чуття (see / hear / watch): дію спричиняєш або сприймаєш цілком - тому без «to». <i>made me work</i> = «змусили мене працювати».</span>
  ✅ made me <b>work</b> &nbsp;·&nbsp; saw him <b>leave</b> &nbsp;·&nbsp; let them <b>go</b> &nbsp;·&nbsp; ❌ made me to work
</span>
'''

[[question]]
id      = 1
group   = "1. -ing група - лише -ing, ніколи «to»"
prompt  = "I really enjoy…"
explain = "Після <b>enjoy</b> йде тільки <b>-ing</b>: enjoy <b>swimming</b>. Ніколи «to swim», ніколи «that…». Тут правильна одна."
options = [
  { text = "swimming in the sea", correct = true },
  { text = "to swim in the sea", correct = false },
  { text = "that I swim", correct = false },
  { text = "me swimming", correct = false },
]

